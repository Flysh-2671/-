name: Parse and Plan H2

on:
  workflow_dispatch:
  push:
    branches:
      - feature/h2-planning

jobs:
  parse-and-plan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run parse_and_plan
        env:
          EXCEL_PASSWORD: ${{ secrets.EXCEL_PASSWORD }}
        run: |
          python scripts/parse_and_plan.py "已签预订单6.30.xlsx"

      - name: Upload outputs as artifact
        uses: actions/upload-artifact@v4
        with:
          name: h2-analysis
          path: outputs/
